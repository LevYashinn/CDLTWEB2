server:
  port: 8088

spring:
  application:
    name: post-service
  datasource:
    url: jdbc:mysql://mysql:3306/fashionstore_post?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Thư mục lưu ảnh upload (được mount volume trong docker-compose để không mất khi build lại)
app:
  upload-dir: uploads/posts

logging:
  level:
    com.fashionstore.post: DEBUG
